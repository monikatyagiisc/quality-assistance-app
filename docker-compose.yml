# Full stack: PostgreSQL + agent + backend + frontend
#
# Setup:
#   cp .env.docker.example .env
#   # Set GOOGLE_API_KEY in .env
#
# Run:
#   docker compose up --build
#
# App URLs (from your machine):
#   Frontend  http://localhost:5173
#   Backend   http://localhost:8000  (docs: /docs)
#   Agent     http://localhost:8001  (docs: /docs)

services:
  postgres:
    image: postgres:16-alpine
    container_name: quality-assistance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: quality_assistance
      POSTGRES_PASSWORD: quality_assistance
      POSTGRES_DB: quality_assistance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quality_assistance -d quality_assistance"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: quality-assistance-agent
    restart: unless-stopped
    environment:
      AGENT_HOST: 0.0.0.0
      AGENT_PORT: 8001
      AGENT_BACKEND: ${AGENT_BACKEND:-gemini}
      AGENT_MODEL: ${AGENT_MODEL:-gemini-2.0-flash}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION_NAME: ${AWS_REGION_NAME:-us-east-1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quality-assistance-backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: quality_assistance
      DB_PASSWORD: quality_assistance
      DB_NAME: quality_assistance
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      AGENT_SERVICE_URL: http://agent:8001
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      JWT_SECRET: ${JWT_SECRET:-docker-dev-jwt-secret-change-me}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-10080}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: quality-assistance-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
